; PlatformIO Project Configuration File
; 两轮平衡车 · 野火小智 STM32F103C8T6
;
; 文档参考：https://docs.platformio.org/en/latest/projectconf/index.html

; ============================================================
; [platformio] — 全局项目配置
; ============================================================
[platformio]
; 默认编译环境（不指定 -e 时使用）
default_envs = fw_balance_bot

; 源码目录（PlatformIO 标准结构，不需手动指定 build_src_flags）
; src_dir = src  ; PlatformIO 默认值，可省略

; ============================================================
; [common] — 所有环境的公共配置
; 官方推荐用法：避免重复，env:NAME 通过 ${env.lib_deps} 引用
; ============================================================
[common]
; ----- 公共 build_flags（可在各 env 中引用 ${common.build_flags}）-----
; $PIOENV      = 当前环境名（如 fw_balance_bot）
; $UNIX_TIME   = 编译时间戳
; $PROJECT_DIR = 项目根目录
build_flags =
    -O2
    -Wall
    -Wextra
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -D F_CPU=72000000
    -D HSE_VALUE=8000000
    -D USE_HAL_DRIVER
    -D VERSION=$UNIX_TIME

; ----- 公共库依赖 -----
; lib_deps 支持多格式：
;   - 库名（自动从 Library Registry 下载）
;   - owner/repo @ semver 范围
;   - GitHub/GitLab URL
;   - 本地路径
; lib_deps =

; ============================================================
; [env] — 所有 env 的默认配置（会被具体 env 继承）
; ============================================================
[env]
; 平台：STMicroelectronics STM32
platform = ststm32

; 框架：STM32Cube HAL
framework = stm32cube

; 开发板：generic STM32F103C8Tx（蓝丸/野火小智通用）
board = genericSTM32F103C8Tx

; 上传工具：ST-LINK
upload_protocol = stlink

; 串口监视器波特率（烧录后查看 PID 输出用）
monitor_speed = 115200

; ----- 继承公共配置 -----
build_flags = ${common.build_flags}

; ============================================================
; [env:fw_balance_bot] — 两轮平衡车主环境
; ============================================================
[env:fw_balance_bot]
; 环境名称：只能用 a-z, 0-9, _, -
	; （上面已合并到 [env]，此处可省略同名 env 块）
	; 本环境额外配置如下

; ----- 编译类型：release / debug -----
; debug: 开启调试符号，适合与 GDB / ST-LINK 配合使用
; release: 开启 -Os 优化，去除调试符号，体积更小
build_type = release

; ----- 上传额外配置 -----
upload_flags =
    -reset
    -halt
    -exit

; ----- 串口监视器过滤器（串口调参用）-----
; --raw      : 关闭终端对 ANSI 转义序列的处理
; --echo     : 回显输入
; --eol CR   : 回车符作为行结束符（Windows 风格）
monitor_eol = CR
monitor_filters =
    --raw
    --echo

; ----- 额外源码包含路径（覆盖 platformio.ini 同级 include/）-----
; PlatformIO 默认包含 src/ 和 include/，以下仅为显式声明
; build_flags =
;     -I include
;     -I src/app
;     -I src/drivers
;     -I src/middleware
;     -I src/utils

; ----- 源码过滤：只编译特定文件 -----
; 默认值：+<*> -<.git/> -<build/> -<test/> -<tests/>
; 不需要手动指定，PlatformIO 会自动扫描 src/
; build_src_filter =
;     +<src/>

; ============================================================
; [env:fw_balance_bot_debug] — 调试专用环境
; ============================================================
[env:fw_balance_bot_debug]
build_type = debug
build_flags =
    ${common.build_flags}
    -D DEBUG=1
    -Og
    -g3
    -ggdb3
    -fstack-usage
; 调试工具（需要配合 ST-LINK 使用）
; debug_tool = stlink
; debug_init_break = main
; debug_init_cmds =
;     monitor reset halt
;     monitor arm semihosting enable
